server:
  port: 0

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
        alphanumeric-ids:
          enabled: true
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  datasource:
    url: jdbc:postgresql://localhost:5435/category_db
    username: category_service
    password: category_password

resilience4j:
  circuitbreaker:
    instances:
      EventServiceClientexistsByCategoryId:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

  timelimiter:
    instances:
      EventServiceClientexistsByCategoryId:
        timeoutDuration: 2s

logging:
  level:
    root: INFO
    ru.practicum: DEBUG