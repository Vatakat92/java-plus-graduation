spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      filter:
        circuit-breaker:
          enabled: true
      default-filters:
        - CircuitBreaker=myCircuitBreaker
      routes:
        - id: main_service_route
          uri: lb://main-service
          predicates:
            - Path=/**
      httpclient:
        connect-timeout: 10000
        response-timeout: 30s

resilience4j:
  timelimiter:
    instances:
      myCircuitBreaker:
        timeout-duration: 30s
  circuitbreaker:
    instances:
      myCircuitBreaker:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: gateway,health,info